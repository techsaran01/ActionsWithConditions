name: Metrix-Test
on:
  push:
    branches:
      - main-skip

jobs:
  build:
    continue-on-error: true
    strategy:
      matrix:
        node-version: [12, 13, 14]
        operating-system: [ubuntu-latest, windows-latest]
        # include additional combination of node 18 with ubuntu
        include:
          - node-version: 18
            operating-system: ubuntu-latest
        # Excluding an existing combination of node 12 with windows
        exclude:
          - node-version: 12
            operating-system: windows-latest

    runs-on: ${{matrix.operating-system}}
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Install Node JS
        uses: actions/setup-node@v4
        with:
          node-vesion: ${{ matrix.node-version}}
      
      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

  report:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Dummy report
        run: echo "The end.."