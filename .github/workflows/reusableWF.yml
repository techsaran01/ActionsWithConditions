name: ReusableDeploy
on: 
  workflow_call:
    inputs:
      artifact-name:
        description: "The name of the artifacts that needs to be deployed"
        required: false
        type: string
        default: dist

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
        
      - name: List files..
        run: ls
        
      - name: Output info
        run: echo "Reusable Deploy ..."